<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#0B0F2F] to-[#0B0F2F] relative overflow-hidden">

  <!-- Background Glow Effects -->
  <div class="absolute w-80 h-80 bg-purple-500 opacity-30 rounded-full blur-3xl top-0 left-0"></div>
  <div class="absolute w-80 h-80 bg-cyan-400 opacity-20 rounded-full blur-3xl bottom-0 right-0"></div>

  <div class="z-10 w-full max-w-md p-8">
    <h2 class="text-white text-4xl font-bold text-center mb-10">Log In</h2>

    <form class="space-y-6">
      <div>
        <label class="block text-sm text-white mb-2" for="email">Email:</label>
        <input id="email" type="email" class="w-full px-6 py-3 rounded-full bg-white/10 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-purple-500" placeholder="Enter your email">
      </div>
      <div>
        <label class="block text-sm text-white mb-2" for="password">Password:</label>
        <input id="password" type="password" class="w-full px-6 py-3 rounded-full bg-white/10 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-purple-500" placeholder="Enter your password">
      </div>

      <div class="flex items-center justify-between pt-6">
        <button type="submit" class="px-6 py-3 bg-purple-400 text-white font-semibold rounded-full hover:bg-purple-500 transition">Submit Now</button>
        <button type="button" class="px-6 py-3 border border-white text-white font-semibold rounded-full hover:bg-white hover:text-black transition">Forgot Password</button>
      </div>
    </form>
  </div>

</body>
</html>
